# URL JDBC do banco — formato: jdbc:mysql://<host>:<porta>/<nome_do_banco>
db.url=jdbc:mysql://localhost:3306/gestao_projetos

# Usuário do MySQL (geralmente "root" em ambiente de desenvolvimento)
db.user=root

# Senha do MySQL — preencha com a sua
db.password=
